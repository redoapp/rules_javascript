# GitLab equivalent of .github/workflows/build.yml.
#
# This pipeline intentionally runs on the hardened untrusted runner lane. It
# uses no project/group secrets and proves the runner boundary on every
# pipeline before cutover. The parity manifest fails closed when the GitHub
# workflow changes without a corresponding GitLab update.

stages:
  - verify

workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

default:
  image:
    name: 864981714355.dkr.ecr.us-east-1.amazonaws.com/ci-gitlab-runner@sha256:64ce59ed5744d806b971f26f5f5ac74bcfbe9242461f3124999f52b1c6fc019d
  tags:
    - redo-build-size-2
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  before_script:
    - .github/configure-bazel

runner-contract:
  stage: verify
  timeout: 5 minutes
  script:
    - |
      set -eu
      test "${REDO_CI_TRUST_BOUNDARY:-}" = "untrusted"
      test "${REDO_CI_CONTAINER_RUNTIME:-}" = "podman-rootless"
      test ! -e /var/run/secrets/kubernetes.io/serviceaccount/token
      test -z "${AWS_ACCESS_KEY_ID+x}"
      test -z "${AWS_SECRET_ACCESS_KEY+x}"
      test -z "${AWS_WEB_IDENTITY_TOKEN_FILE+x}"
      test -z "${GITLAB_TOKEN+x}"
      docker info >/dev/null
      printf 'runner_id=%s runner=%s tags=%s host=%s trust=%s runtime=%s\n' \
        "$CI_RUNNER_ID" "$CI_RUNNER_DESCRIPTION" "$CI_RUNNER_TAGS" "$(hostname)" \
        "$REDO_CI_TRUST_BOUNDARY" "$REDO_CI_CONTAINER_RUNTIME"

ci-parity:
  stage: verify
  timeout: 5 minutes
  script:
    - node ci/verify-gitlab-parity.mjs

lint:
  stage: verify
  timeout: 30 minutes
  script:
    - bazel test tools/lint:format_test tools/lint:lint_test
    - bazel run @files//packages:bazelrc.diff
    - bazel run tools/test:bazelrc.diff

test:
  stage: verify
  timeout: 45 minutes
  script:
    - bazel test :test
