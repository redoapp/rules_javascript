# GitLab equivalent of .github/workflows/build.yml.
#
# This public-repository pipeline uses no project/group secrets and fails if a
# configured secret is injected. The current spot lane is valid for this
# non-secret proof; secret-bearing work remains blocked until the runner
# advertises and passes the hardened untrusted contract below. The parity
# manifest fails closed when the GitHub workflow changes without a matching
# GitLab update.

stages:
  - verify

workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

variables:
  # The current runner's mounted /home/runner/.cache/bazel parent is
  # root-owned. Keep all per-job Bazel/Bazelisk state in writable pod-local
  # storage; no cache or credentials cross the untrusted job boundary.
  HOME: /tmp

default:
  image:
    name: 864981714355.dkr.ecr.us-east-1.amazonaws.com/ci-gitlab-runner@sha256:64ce59ed5744d806b971f26f5f5ac74bcfbe9242461f3124999f52b1c6fc019d
  tags:
    - redo-build-size-2
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  before_script:
    - .github/configure-bazel
    # The repository preset expands ~ from the passwd entry rather than HOME.
    # Override its root-owned runner mount with a writable pod-local cache.
    # Kubernetes already isolates the job container; keep ordinary actions and
    # tests sandboxed, but disable only persistent-worker sandbox nesting, whose
    # bind-mount setup is unavailable in this runner pod.
    - |
      printf '%s\n' \
        'build --config=ci' \
        'common:linux --disk_cache=/tmp/bazel-disk' \
        'build --@bazel_util//generate:format_filter=@bazel_util//file:all_filter' \
        'build --noexperimental_use_hermetic_linux_sandbox' \
        'build --noworker_sandboxing' \
        'build --noexperimental_worker_sandbox_hardening' \
        'build --noexperimental_worker_multiplex_sandboxing' \
        > .bazelrc.user

runner-contract:
  stage: verify
  timeout: 5 minutes
  script:
    - |
      set -eu
      test "$CI_RUNNER_DESCRIPTION" = "redo-build-size-2"
      case "$CI_RUNNER_TAGS" in
        *redo-build-size-2*) ;;
        *) echo "unexpected runner tags" >&2; exit 1 ;;
      esac
      test -z "${GITLAB_TOKEN+x}"

      hardened_state=current-spot-non-secret-only
      if test -n "${REDO_CI_TRUST_BOUNDARY:-}"; then
        test "$REDO_CI_TRUST_BOUNDARY" = "untrusted"
        test "${REDO_CI_CONTAINER_RUNTIME:-}" = "none"
        test ! -e /var/run/secrets/kubernetes.io/serviceaccount/token
        test -z "${AWS_ACCESS_KEY_ID+x}"
        test -z "${AWS_SECRET_ACCESS_KEY+x}"
        test -z "${AWS_WEB_IDENTITY_TOKEN_FILE+x}"
        hardened_state=hardened-untrusted
      fi

      aws_identity_present=no
      if test -n "${AWS_ACCESS_KEY_ID+x}${AWS_WEB_IDENTITY_TOKEN_FILE+x}"; then
        aws_identity_present=yes
      fi
      kubernetes_token_present=no
      if test -e /var/run/secrets/kubernetes.io/serviceaccount/token; then
        kubernetes_token_present=yes
      fi

      printf 'runner_id=%s runner=%s tags=%s host=%s boundary=%s aws_identity=%s kubernetes_token=%s\n' \
        "$CI_RUNNER_ID" "$CI_RUNNER_DESCRIPTION" "$CI_RUNNER_TAGS" "$(hostname)" \
        "$hardened_state" "$aws_identity_present" "$kubernetes_token_present"

ci-parity:
  stage: verify
  timeout: 5 minutes
  script:
    - node ci/verify-gitlab-parity.mjs

lint:
  stage: verify
  timeout: 30 minutes
  script:
    - bazel test tools/lint:format_test tools/lint:lint_test
    - bazel run @files//packages:bazelrc.diff
    - bazel run tools/test:bazelrc.diff

test:
  stage: verify
  timeout: 45 minutes
  script:
    - bazel test :test
